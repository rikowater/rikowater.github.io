<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>風のつなぐ道 | In-game Mock</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="mock-shell" aria-label="うまく飛べない小鳥のパズルステージ">
      <section class="game-screen" id="gameScreen">
        <img class="concept-wash" src="./assets/layers/cloud-ruins-bg.png" alt="" />

        <div class="sky-paint sky-paint-a" aria-hidden="true"></div>
        <div class="sky-paint sky-paint-b" aria-hidden="true"></div>
        <div class="soft-fog fog-front" aria-hidden="true"></div>
        <div class="soft-fog fog-back" aria-hidden="true"></div>

        <div class="far-ruins far-ruins-left" aria-hidden="true">
          <span></span><span></span><span></span>
        </div>
        <div class="far-ruins far-ruins-right" aria-hidden="true">
          <span></span><span></span><span></span>
        </div>

        <section class="playfield" id="playfield" aria-label="雲の上のパズル盤面">
          <svg class="movement-trail" viewBox="0 0 100 100" preserveAspectRatio="none" aria-hidden="true">
            <path id="movementTrailGlow"></path>
            <path id="movementTrailPath"></path>
          </svg>
          <div class="board-layer" id="boardLayer"></div>
          <div class="air-birds" aria-hidden="true">
            <span></span><span></span><span></span><span></span>
          </div>
        </section>

        <div class="player-layer" id="playerLayer" aria-live="polite">
          <div class="goal-marker" id="goalMarker" aria-hidden="true"></div>
          <div class="pc-bird bird-token" id="pcBird" data-direction="idle" aria-label="操作中の小鳥">
            <img id="birdSprite" src="./assets/sprites/bird-directions/bird-idle.png" alt="" />
          </div>
        </div>

        <div class="stage-label" id="stageLabel" aria-live="polite">ステージ99</div>

        <div class="top-menu">
          <button class="round-button menu-button" id="menuButton" type="button" aria-label="メニュー" aria-expanded="false">
            <span></span><span></span><span></span>
          </button>
          <div class="stage-menu" id="stageMenu" aria-hidden="true">
            <button id="nextStageButton" type="button">次のステージ</button>
            <button id="retryStageButton" type="button">このステージをやり直す</button>
          </div>
        </div>

        <div class="distance-hud" id="distanceHud" aria-label="移動可能距離">
          <svg class="distance-icon" viewBox="0 0 32 32" aria-hidden="true">
            <path d="M25.7 4.9C14.2 5.4 7.5 11.7 5.4 22c4.1-.7 7.2-2.2 9.4-4.5-1.1 3.2-3.3 6-6.6 8.2l1.3 2.3c3.5-2.2 6.1-5.4 7.8-9.6 3.1-.6 7-3.7 8.4-13.5Z" />
          </svg>
          <div class="distance-bar" aria-hidden="true">
            <span id="distanceBarFill"></span>
          </div>
        </div>

        <div class="bottom-control bottom-left">
          <button class="round-button action-button" id="resetButton" type="button" aria-label="リセット">
            <svg viewBox="0 0 32 32" aria-hidden="true">
              <path d="M24.2 12.3a8.6 8.6 0 1 1-2.9-4.1" />
              <path d="M22.2 3.8v6.4h-6.4" />
            </svg>
          </button>
        </div>

        <div class="result-panel" id="resultPanel" aria-hidden="true">
          <div class="result-inner">
            <p class="result-kicker">Stage Clear</p>
            <h1>光の羽に届いた</h1>
            <button id="resultResetButton" type="button">もう一度</button>
          </div>
        </div>

        <div class="gameover-panel" id="gameoverPanel" aria-hidden="true">
          <div class="gameover-inner">
            <p class="gameover-kicker">GAMEOVER</p>
            <h1>風が尽きてしまった</h1>
            <button id="gameoverRetryButton" type="button">もう一度チャレンジ</button>
          </div>
        </div>

        <div class="stage-toast" id="stageToast" role="status" aria-live="polite"></div>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
