<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>風のつなぐ道 | In-game Mock</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="mock-shell" aria-label="うまく飛べない小鳥のパズルステージ">
      <section class="game-screen" id="gameScreen">
        <img class="concept-wash" src="./assets/layers/cloud-ruins-bg.png" alt="" />

        <div class="sky-paint sky-paint-a" aria-hidden="true"></div>
        <div class="sky-paint sky-paint-b" aria-hidden="true"></div>
        <div class="soft-fog fog-front" aria-hidden="true"></div>
        <div class="soft-fog fog-back" aria-hidden="true"></div>

        <div class="far-ruins far-ruins-left" aria-hidden="true">
          <span></span><span></span><span></span>
        </div>
        <div class="far-ruins far-ruins-right" aria-hidden="true">
          <span></span><span></span><span></span>
        </div>

        <section class="playfield" id="playfield" aria-label="雲の上のパズル盤面">
          <div class="board-layer" id="boardLayer"></div>
          <div class="air-birds" aria-hidden="true">
            <span></span><span></span><span></span><span></span>
          </div>
        </section>

        <div class="player-layer" id="playerLayer" aria-live="polite">
          <div class="goal-marker" id="goalMarker" aria-hidden="true"></div>
          <div class="pc-bird bird-token" id="pcBird" data-direction="idle" aria-label="操作中の小鳥">
            <img id="birdSprite" src="./assets/sprites/bird-directions/bird-idle.png" alt="" />
          </div>
        </div>

        <div class="bottom-control bottom-left">
          <button class="round-button action-button" id="resetButton" type="button" aria-label="リセット">
            <svg viewBox="0 0 32 32" aria-hidden="true">
              <path d="M24.2 12.3a8.6 8.6 0 1 1-2.9-4.1" />
              <path d="M22.2 3.8v6.4h-6.4" />
            </svg>
          </button>
        </div>

        <div class="bottom-control bottom-right">
          <button class="round-button action-button" id="hintButton" type="button" aria-label="ヒント">
            <svg viewBox="0 0 32 32" aria-hidden="true">
              <path d="M26.3 4.6C15.8 5.1 8.9 10.8 6.8 20.7c3.9-.7 6.8-2.2 8.8-4.3-1.2 3.2-3.4 5.9-6.5 8.1l1.2 2.4c3.3-2.1 5.8-5.2 7.5-9.2 2.9-.4 6.9-3.4 8.5-13.1Z" />
            </svg>
          </button>
        </div>

        <div class="result-panel" id="resultPanel" aria-hidden="true">
          <div class="result-inner">
            <p class="result-kicker">Stage Clear</p>
            <h1>光の羽に届いた</h1>
            <button id="resultResetButton" type="button">もう一度</button>
          </div>
        </div>

        <div class="stage-toast" id="stageToast" role="status" aria-live="polite"></div>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
