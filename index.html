<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>風のつなぐ道 | In-game Mock</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="mock-shell" aria-label="うまく飛べない小鳥のパズルステージ">
      <section class="game-screen" id="gameScreen">
        <img class="concept-wash" src="./assets/layers/sky-bg.svg" alt="" />

        <div class="sky-paint sky-paint-a" aria-hidden="true"></div>
        <div class="sky-paint sky-paint-b" aria-hidden="true"></div>
        <div class="soft-fog fog-front" aria-hidden="true"></div>
        <div class="soft-fog fog-back" aria-hidden="true"></div>

        <div class="far-ruins far-ruins-left" aria-hidden="true">
          <span></span><span></span><span></span>
        </div>
        <div class="far-ruins far-ruins-right" aria-hidden="true">
          <span></span><span></span><span></span>
        </div>

        <header class="hud hud-top">
          <div class="mission-block">
            <div class="stage-heading">
              <svg viewBox="0 0 32 32" aria-hidden="true">
                <path d="M26.3 4.6C15.8 5.1 8.9 10.8 6.8 20.7c3.9-.7 6.8-2.2 8.8-4.3-1.2 3.2-3.4 5.9-6.5 8.1l1.2 2.4c3.3-2.1 5.8-5.2 7.5-9.2 2.9-.4 6.9-3.4 8.5-13.1Z" />
              </svg>
              <span>ステージ 2-7</span>
              <span>風のつなぐ道</span>
            </div>
            <div class="thread-line" aria-hidden="true"></div>
            <p>
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 3.1c1.5 3.5 3.7 5.7 7.3 7.2-3.6 1.5-5.8 3.7-7.3 7.3-1.5-3.6-3.7-5.8-7.2-7.3 3.5-1.5 5.7-3.7 7.2-7.2Z" />
                <path d="M5.4 16.8c.8 1.8 1.8 2.8 3.6 3.6-1.8.8-2.8 1.8-3.6 3.6-.8-1.8-1.8-2.8-3.6-3.6 1.8-.8 2.8-1.8 3.6-3.6Z" />
              </svg>
              <span>風をうまく使って、<br />光の道をゴールまでつなごう。</span>
            </p>
          </div>

          <div class="distance-block" aria-label="のこり距離">
            <div class="distance-label">
              <svg viewBox="0 0 32 32" aria-hidden="true">
                <path d="M26.3 4.6C15.8 5.1 8.9 10.8 6.8 20.7c3.9-.7 6.8-2.2 8.8-4.3-1.2 3.2-3.4 5.9-6.5 8.1l1.2 2.4c3.3-2.1 5.8-5.2 7.5-9.2 2.9-.4 6.9-3.4 8.5-13.1Z" />
              </svg>
              <span>のこり距離</span>
            </div>
            <div class="feather-track" aria-hidden="true">
              <span class="feather active"></span>
              <span class="feather active"></span>
              <span class="feather active"></span>
              <span class="feather active"></span>
              <span class="feather active"></span>
              <span class="feather dim"></span>
              <span class="feather dim"></span>
              <span class="dot"></span>
              <span class="dot"></span>
              <span class="dot"></span>
            </div>
          </div>

          <button class="round-button menu-button" type="button" aria-label="メニュー">
            <span></span><span></span><span></span>
          </button>
        </header>

        <section class="playfield" id="playfield" aria-label="雲の上のパズル盤面">
          <svg class="trail-layer" viewBox="0 0 1000 560" preserveAspectRatio="none" aria-hidden="true">
            <path class="gold-trail trail-main" d="M142 344 C235 314 292 275 354 245 C414 216 452 210 504 230" />
            <path class="gold-trail trail-branch" d="M352 246 C319 318 273 372 206 418" />
            <path class="blue-trail" d="M540 233 C606 193 681 197 716 250 C748 297 705 344 630 346" />
            <path class="blue-trail small" d="M598 364 C655 388 704 379 745 338" />
          </svg>
          <div class="board-layer" id="boardLayer"></div>
          <div class="air-birds" aria-hidden="true">
            <span></span><span></span><span></span><span></span>
          </div>
        </section>

        <div class="player-layer" id="playerLayer" aria-live="polite">
          <div class="goal-marker" id="goalMarker" aria-hidden="true"></div>
          <div class="pc-bird bird-token" id="pcBird" aria-label="操作中の小鳥">
            <img src="./assets/sprites/bird.svg" alt="" />
          </div>
        </div>

        <div class="bottom-control bottom-left">
          <button class="round-button action-button" id="resetButton" type="button" aria-label="リセット">
            <svg viewBox="0 0 32 32" aria-hidden="true">
              <path d="M24.2 12.3a8.6 8.6 0 1 1-2.9-4.1" />
              <path d="M22.2 3.8v6.4h-6.4" />
            </svg>
          </button>
          <span>リセット</span>
        </div>

        <div class="bottom-control bottom-right">
          <button class="round-button action-button" id="hintButton" type="button" aria-label="ヒント">
            <svg viewBox="0 0 32 32" aria-hidden="true">
              <path d="M26.3 4.6C15.8 5.1 8.9 10.8 6.8 20.7c3.9-.7 6.8-2.2 8.8-4.3-1.2 3.2-3.4 5.9-6.5 8.1l1.2 2.4c3.3-2.1 5.8-5.2 7.5-9.2 2.9-.4 6.9-3.4 8.5-13.1Z" />
            </svg>
          </button>
          <span>ヒント</span>
        </div>

        <div class="stage-toast" id="stageToast" role="status" aria-live="polite"></div>

        <div class="pause-panel" id="pausePanel" aria-hidden="true">
          <div class="pause-inner">
            <span>旅の途中</span>
            <button type="button" id="resumeButton">戻る</button>
          </div>
        </div>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
